<svg width="700" height="480" viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial,Helvetica,sans-serif">

  <text x="350" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">DFD Level 1 — Internal Process Decomposition</text>

  <defs>
    <marker id="d1arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2c5f8a"/>
    </marker>
    <marker id="d1arr-g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#1a7a4a"/>
    </marker>
  </defs>

  <!-- ── Process circles (rounded rects) ── -->
  <!-- P1: Validate User Input -->
  <ellipse cx="100" cy="80" rx="70" ry="32" fill="#e8f0f8" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="100" y="76" text-anchor="middle" font-size="9" font-weight="bold" fill="#2c5f8a">P1</text>
  <text x="100" y="88" text-anchor="middle" font-size="8.5" fill="#111">Validate User Input</text>
  <text x="100" y="99" text-anchor="middle" font-size="8" fill="#555">→ Risk Profile</text>

  <!-- P2: Fetch & Cache NAV -->
  <ellipse cx="310" cy="80" rx="75" ry="32" fill="#e8f0f8" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="310" y="76" text-anchor="middle" font-size="9" font-weight="bold" fill="#2c5f8a">P2</text>
  <text x="310" y="88" text-anchor="middle" font-size="8.5" fill="#111">Fetch &amp; Cache</text>
  <text x="310" y="99" text-anchor="middle" font-size="8.5" fill="#111">NAV Data</text>

  <!-- P3: Compute 9 Metrics -->
  <ellipse cx="560" cy="80" rx="75" ry="32" fill="#e8f0f8" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="560" y="76" text-anchor="middle" font-size="9" font-weight="bold" fill="#2c5f8a">P3</text>
  <text x="560" y="88" text-anchor="middle" font-size="8.5" fill="#111">Compute 9 Financial</text>
  <text x="560" y="99" text-anchor="middle" font-size="8.5" fill="#111">Metrics + Score</text>

  <!-- P4: Generate Portfolio Buckets -->
  <ellipse cx="100" cy="235" rx="75" ry="32" fill="#e8f0f8" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="100" y="231" text-anchor="middle" font-size="9" font-weight="bold" fill="#2c5f8a">P4</text>
  <text x="100" y="243" text-anchor="middle" font-size="8.5" fill="#111">Generate Portfolio</text>
  <text x="100" y="254" text-anchor="middle" font-size="8.5" fill="#111">Buckets</text>

  <!-- P5: Compute Blended Benchmark -->
  <ellipse cx="340" cy="235" rx="80" ry="32" fill="#eaf5ee" stroke="#1a7a4a" stroke-width="1.5"/>
  <text x="340" y="231" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a7a4a">P5</text>
  <text x="340" y="243" text-anchor="middle" font-size="8.5" fill="#111">Compute Blended</text>
  <text x="340" y="254" text-anchor="middle" font-size="8.5" fill="#111">Benchmark</text>

  <!-- P6: Attribution Analysis -->
  <ellipse cx="580" cy="235" rx="80" ry="32" fill="#eaf5ee" stroke="#1a7a4a" stroke-width="1.5"/>
  <text x="580" y="231" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a7a4a">P6</text>
  <text x="580" y="243" text-anchor="middle" font-size="8.5" fill="#111">Attribution Analysis</text>
  <text x="580" y="254" text-anchor="middle" font-size="8.5" fill="#111">BHB + Alpha + IR</text>

  <!-- P7: Generate Report -->
  <ellipse cx="340" cy="390" rx="75" ry="32" fill="#f0faf5" stroke="#1a7a4a" stroke-width="1.8"/>
  <text x="340" y="386" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a7a4a">P7</text>
  <text x="340" y="398" text-anchor="middle" font-size="8.5" fill="#111">Generate Final Report</text>
  <text x="340" y="409" text-anchor="middle" font-size="8.5" fill="#111">→ User</text>

  <!-- ── Data Stores ── -->
  <!-- D1: Fund Cache (MongoDB) -->
  <line x1="180" y1="158" x2="440" y2="158" stroke="#555" stroke-width="1.5"/>
  <line x1="180" y1="168" x2="440" y2="168" stroke="#555" stroke-width="1.5"/>
  <rect x="180" y="158" width="260" height="10" fill="#f5f5f5"/>
  <text x="195" y="167" font-size="9" fill="#333" font-weight="bold">D1</text>
  <text x="310" y="167" text-anchor="middle" font-size="9" fill="#333">Fund Cache — MongoDB (NAVRecord, FundHistory)</text>

  <!-- D2: NAV Collection -->
  <line x1="180" y1="318" x2="530" y2="318" stroke="#555" stroke-width="1.5"/>
  <line x1="180" y1="328" x2="530" y2="328" stroke="#555" stroke-width="1.5"/>
  <rect x="180" y="318" width="350" height="10" fill="#f5f5f5"/>
  <text x="195" y="327" font-size="9" fill="#333" font-weight="bold">D2</text>
  <text x="355" y="327" text-anchor="middle" font-size="9" fill="#333">NAV Records — MongoDB (benchmark proxy NAVs)</text>

  <!-- ── External entities ── -->
  <rect x="2"  y="64" width="22" height="28" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="13" y="82" text-anchor="middle" font-size="8" font-weight="bold" fill="#111" transform="rotate(-90,13,78)">User</text>
  <rect x="2"  y="218" width="22" height="28" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="13" y="236" text-anchor="middle" font-size="8" font-weight="bold" fill="#111" transform="rotate(-90,13,232)">User</text>

  <!-- mfapi.in -->
  <rect x="280" y="28" width="62" height="22" rx="2" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="311" y="43" text-anchor="middle" font-size="8.5" fill="#555">mfapi.in</text>

  <!-- ── Flow arrows ── -->
  <!-- User → P1 -->
  <line x1="24" y1="78" x2="30" y2="78" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#d1arr)"/>
  <text x="27" y="74" font-size="7.5" fill="#555">profile</text>

  <!-- P1 → P4: Risk Profile -->
  <line x1="100" y1="112" x2="100" y2="203" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#d1arr)"/>
  <text x="105" y="160" font-size="8" fill="#555">Risk Profile</text>

  <!-- P1 → P2: fund query params -->
  <line x1="170" y1="80" x2="235" y2="80" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#d1arr)"/>
  <text x="202" y="76" text-anchor="middle" font-size="8" fill="#555">query params</text>

  <!-- mfapi.in → P2 -->
  <line x1="311" y1="50" x2="311" y2="48" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#d1arr)"/>
  <line x1="311" y1="50" x2="311" y2="112" stroke="none"/>
  <line x1="311" y1="50" x2="310" y2="48" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="65" font-size="8" fill="#888">NAV data</text>

  <!-- P2 → D1 (write cache) -->
  <line x1="310" y1="112" x2="310" y2="158" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#d1arr)"/>
  <text x="315" y="138" font-size="8" fill="#555">cache write</text>

  <!-- D1 → P3 (read cached fund data) -->
  <line x1="420" y1="158" x2="510" y2="112" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#d1arr)"/>
  <text x="472" y="130" font-size="8" fill="#555">fund history</text>

  <!-- P3 → P4: scored funds -->
  <line x1="488" y1="85" x2="178" y2="220" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#d1arr)"/>
  <text x="350" y="148" font-size="8" fill="#555">scored &amp; ranked funds</text>

  <!-- P4 → P5: bucket -->
  <line x1="175" y1="235" x2="260" y2="235" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="217" y="231" text-anchor="middle" font-size="8" fill="#555">bucket</text>

  <!-- P5 → D2: read benchmark NAV -->
  <line x1="340" y1="267" x2="340" y2="318" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="345" y="296" font-size="8" fill="#555">benchmark query</text>

  <!-- D2 → P6: NAV for rolling -->
  <line x1="450" y1="323" x2="540" y2="267" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="505" y="298" font-size="8" fill="#555">NAV records</text>

  <!-- P5 → P6 -->
  <line x1="420" y1="235" x2="500" y2="235" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="460" y="231" text-anchor="middle" font-size="8" fill="#555">blended returns</text>

  <!-- P4 → P7 -->
  <line x1="100" y1="267" x2="280" y2="375" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="175" y="320" text-anchor="middle" font-size="8" fill="#555">portfolio options</text>

  <!-- P5 → P7 -->
  <line x1="310" y1="267" x2="310" y2="358" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="298" y="315" font-size="8" fill="#555">benchmark data</text>

  <!-- P6 → P7 -->
  <line x1="540" y1="255" x2="415" y2="375" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="500" y="318" font-size="8" fill="#555">attribution results</text>

  <!-- P7 → User -->
  <line x1="265" y1="400" x2="26" y2="243" stroke="#1a7a4a" stroke-width="1.2" marker-end="url(#d1arr-g)"/>
  <text x="120" y="326" font-size="8" fill="#1a7a4a">Final Report</text>

  <rect x="1" y="1" width="698" height="478" rx="4" fill="none" stroke="#ccc" stroke-width="1"/>
</svg>
