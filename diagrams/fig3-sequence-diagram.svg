<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial,Helvetica,sans-serif">

  <text x="360" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Sequence Diagram — Portfolio Generation Request</text>

  <!-- ── Lifeline headers ── -->
  <!-- X positions: User=30, API=130, MongoDB=230, MarketData=310, Analytics=390, Benchmark=475, Attribution=560, MLService=645 -->

  <defs>
    <marker id="sq-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c5f8a"/>
    </marker>
    <marker id="ret-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <!-- Header boxes -->
  <rect x="5"   y="28" width="55" height="28" rx="3" fill="#2c5f8a"/>
  <text x="32"  y="47" text-anchor="middle" font-size="9.5" fill="white" font-weight="bold">User</text>

  <rect x="100" y="28" width="60" height="28" rx="3" fill="#2c5f8a"/>
  <text x="130" y="47" text-anchor="middle" font-size="9.5" fill="white" font-weight="bold">API</text>

  <rect x="197" y="28" width="66" height="28" rx="3" fill="#555"/>
  <text x="230" y="47" text-anchor="middle" font-size="9.5" fill="white" font-weight="bold">MongoDB</text>

  <rect x="278" y="28" width="66" height="28" rx="3" fill="#555"/>
  <text x="311" y="41" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Market</text>
  <text x="311" y="52" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">DataSvc</text>

  <rect x="360" y="28" width="66" height="28" rx="3" fill="#555"/>
  <text x="393" y="41" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Analytics</text>
  <text x="393" y="52" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Engine</text>

  <rect x="443" y="28" width="66" height="28" rx="3" fill="#1a7a4a"/>
  <text x="476" y="41" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Benchmark</text>
  <text x="476" y="52" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Service</text>

  <rect x="527" y="28" width="66" height="28" rx="3" fill="#1a7a4a"/>
  <text x="560" y="41" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Attribution</text>
  <text x="560" y="52" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Service</text>

  <rect x="611" y="28" width="66" height="28" rx="3" fill="#8b2c8a"/>
  <text x="644" y="41" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">ML</text>
  <text x="644" y="52" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">Service</text>

  <!-- Lifelines (dashed vertical) -->
  <line x1="32"  y1="56" x2="32"  y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="130" y1="56" x2="130" y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="56" x2="230" y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="311" y1="56" x2="311" y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="393" y1="56" x2="393" y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="476" y1="56" x2="476" y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="560" y1="56" x2="560" y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="644" y1="56" x2="644" y2="500" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Activation boxes on API lifeline (main actor during processing) -->
  <rect x="126" y="85" width="8" height="390" rx="1" fill="#d0e4f7"/>

  <!-- ── Messages ── -->

  <!-- 1. User → API: POST /buckets/generate -->
  <line x1="32" y1="90" x2="122" y2="90" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#sq-arr)"/>
  <text x="77" y="87" text-anchor="middle" font-size="9" fill="#111">POST /buckets/generate {amount, duration, riskLevel}</text>

  <!-- 2. API → MongoDB: Find funds -->
  <line x1="134" y1="115" x2="222" y2="115" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#sq-arr)"/>
  <text x="178" y="112" text-anchor="middle" font-size="9" fill="#111">Find( FundHistory / FinancialData )</text>

  <!-- 3. MongoDB → API: fund data -->
  <line x1="222" y1="135" x2="134" y2="135" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>
  <text x="178" y="131" text-anchor="middle" font-size="9" fill="#777">Fund data (NAV history, metrics)</text>

  <!-- 4. API → MarketData: getMarketReturns(120) -->
  <line x1="134" y1="158" x2="303" y2="158" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#sq-arr)"/>
  <text x="218" y="155" text-anchor="middle" font-size="9" fill="#111">getMarketReturns(120)</text>

  <!-- 5. MarketData → API: Nifty 50 returns -->
  <line x1="303" y1="176" x2="134" y2="176" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>
  <text x="218" y="172" text-anchor="middle" font-size="9" fill="#777">Real Nifty 50 monthly returns array</text>

  <!-- 6. API → Analytics: compute 9 metrics per fund -->
  <line x1="134" y1="200" x2="385" y2="200" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#sq-arr)"/>
  <text x="259" y="197" text-anchor="middle" font-size="9" fill="#111">compute 9 metrics(returns, marketReturns)</text>

  <!-- 7. Analytics → API: metrics -->
  <line x1="385" y1="220" x2="134" y2="220" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>
  <text x="259" y="216" text-anchor="middle" font-size="9" fill="#777">fundsWithMetrics[ ]</text>

  <!-- 8. API self: score & rank (category normalization) -->
  <path d="M134 245 Q175 245 175 252 Q175 259 134 259" fill="none" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#sq-arr)"/>
  <text x="190" y="256" font-size="9" fill="#111">calculateFundScore(metrics, categoryMetrics, riskLevel)</text>

  <!-- 9. API → Benchmark: calculateBlendedBenchmark -->
  <line x1="134" y1="280" x2="468" y2="280" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#sq-arr)"/>
  <text x="301" y="277" text-anchor="middle" font-size="9" fill="#111">calculateBlendedBenchmark(bucket)</text>

  <!-- 10. Benchmark → MongoDB: fetchBenchmarkReturns -->
  <line x1="468" y1="296" x2="238" y2="296" stroke="#2c5f8a" stroke-width="1" marker-end="url(#sq-arr)"/>
  <text x="353" y="292" text-anchor="middle" font-size="8.5" fill="#555">NAV.find({schemeCode})</text>

  <!-- 10b. MongoDB → Benchmark -->
  <line x1="238" y1="308" x2="468" y2="308" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>

  <!-- 11. Benchmark → API: blended returns -->
  <line x1="468" y1="322" x2="134" y2="322" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>
  <text x="301" y="318" text-anchor="middle" font-size="9" fill="#777">blendedBenchmarkReturns {1Y, 3Y, 5Y}</text>

  <!-- 12. API → Attribution: computeFullAttributionReport -->
  <line x1="134" y1="345" x2="552" y2="345" stroke="#1a7a4a" stroke-width="1.5" marker-end="url(#sq-arr)"/>
  <text x="343" y="342" text-anchor="middle" font-size="9" fill="#111">computeFullAttributionReport(bucket, duration, policyWeights)</text>

  <!-- 13. Attribution → API: alpha, IR, BHB -->
  <line x1="552" y1="362" x2="134" y2="362" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>
  <text x="343" y="358" text-anchor="middle" font-size="9" fill="#777">{jensensAlpha, IR, bhbAttribution, rollingConsistency}</text>

  <!-- 14. API → ML: SHAP (async, dashed) -->
  <line x1="134" y1="383" x2="636" y2="383" stroke="#8b2c8a" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#sq-arr)"/>
  <text x="390" y="380" text-anchor="middle" font-size="9" fill="#8b2c8a">SHAP explain(fundMetrics)  [async, 3s timeout]</text>

  <!-- 15. ML → API: SHAP values -->
  <line x1="636" y1="398" x2="134" y2="398" stroke="#8b2c8a" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>
  <text x="390" y="394" text-anchor="middle" font-size="9" fill="#8b2c8a">shapValues per fund</text>

  <!-- 16. API → User: response -->
  <line x1="122" y1="425" x2="32" y2="425" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ret-arr)"/>
  <text x="77" y="422" text-anchor="middle" font-size="9" fill="#111">200 OK: { bucketOptions[ ] + attribution + SHAP }</text>

  <!-- Note box -->
  <rect x="5" y="448" width="710" height="46" rx="3" fill="#fff8e8" stroke="#c8a000" stroke-width="1"/>
  <text x="360" y="463" text-anchor="middle" font-size="9.5" fill="#555" font-weight="bold">Key notes:</text>
  <text x="360" y="476" text-anchor="middle" font-size="9" fill="#555">  Market returns fetched once per request (not per fund). Attribution runs in parallel for all bucket options. ML service failure is non-fatal (attribution: null fallback).</text>
</svg>
