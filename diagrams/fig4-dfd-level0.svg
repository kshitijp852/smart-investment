<svg width="600" height="340" viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial,Helvetica,sans-serif">

  <text x="300" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">DFD Level 0 — Context Diagram</text>

  <defs>
    <marker id="dfd0-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c5f8a"/>
    </marker>
    <marker id="dfd0-arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a7a4a"/>
    </marker>
  </defs>

  <!-- Central process: SmartInvest System -->
  <rect x="195" y="115" width="210" height="80" rx="6" fill="#2c5f8a"/>
  <text x="300" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SmartInvest</text>
  <text x="300" y="164" text-anchor="middle" font-size="11" fill="white">System</text>
  <text x="300" y="178" text-anchor="middle" font-size="9" fill="#d0e0f0">Node.js / React / MongoDB</text>

  <!-- External entity: User (top-left) -->
  <rect x="30"  y="35"  width="110" height="44" rx="3" fill="none" stroke="#333" stroke-width="2"/>
  <text x="85"  y="61"  text-anchor="middle" font-size="12" font-weight="bold" fill="#111">User</text>

  <!-- External entity: Admin (top-right) -->
  <rect x="460" y="35"  width="110" height="44" rx="3" fill="none" stroke="#333" stroke-width="2"/>
  <text x="515" y="61"  text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Admin</text>

  <!-- External entity: mfapi.in (bottom-left) -->
  <rect x="30"  y="255" width="120" height="44" rx="3" fill="none" stroke="#333" stroke-width="2"/>
  <text x="90"  y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">mfapi.in</text>
  <text x="90"  y="290" text-anchor="middle" font-size="9"  fill="#555">NAV Data API</text>

  <!-- External entity: ML Service (bottom-right) -->
  <rect x="450" y="255" width="120" height="44" rx="3" fill="none" stroke="#333" stroke-width="2"/>
  <text x="510" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">ML Service</text>
  <text x="510" y="290" text-anchor="middle" font-size="9"  fill="#555">Python / SHAP</text>

  <!-- ── Flows: User ↔ System ── -->
  <!-- User → System: Investment Profile -->
  <line x1="140" y1="65" x2="195" y2="135" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#dfd0-arr)"/>
  <text x="155" y="93" font-size="9" fill="#2c5f8a">Investment Profile</text>
  <text x="155" y="103" font-size="9" fill="#2c5f8a">(amount, duration, risk)</text>

  <!-- System → User: Recommendations -->
  <line x1="200" y1="130" x2="138" y2="68" stroke="#1a7a4a" stroke-width="1.5" marker-end="url(#dfd0-arr-r)"/>
  <text x="90" y="130" font-size="9" fill="#1a7a4a">Portfolio Recommendations</text>
  <text x="90" y="141" font-size="9" fill="#1a7a4a">+ Attribution Report</text>

  <!-- ── Flows: Admin → System ── -->
  <line x1="460" y1="65" x2="400" y2="128" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#dfd0-arr)"/>
  <text x="435" y="90" font-size="9" fill="#2c5f8a" text-anchor="middle">Cache Refresh</text>
  <text x="435" y="101" font-size="9" fill="#2c5f8a" text-anchor="middle">/ Seed Command</text>

  <!-- ── Flows: System ↔ mfapi.in ── -->
  <line x1="200" y1="183" x2="148" y2="255" stroke="#2c5f8a" stroke-width="1.5" marker-end="url(#dfd0-arr)"/>
  <text x="125" y="218" font-size="9" fill="#2c5f8a">API Request</text>
  <text x="125" y="229" font-size="9" fill="#2c5f8a">{schemeCode}</text>

  <line x1="150" y1="256" x2="202" y2="186" stroke="#1a7a4a" stroke-width="1.5" marker-end="url(#dfd0-arr-r)"/>
  <text x="185" y="248" font-size="9" fill="#1a7a4a">NAV History</text>
  <text x="185" y="259" font-size="9" fill="#1a7a4a">+ Scheme Meta</text>

  <!-- ── Flows: System ↔ ML Service ── -->
  <line x1="400" y1="183" x2="452" y2="255" stroke="#8b2c8a" stroke-width="1.5" marker-end="url(#dfd0-arr)"/>
  <text x="446" y="218" font-size="9" fill="#8b2c8a">Fund Metric</text>
  <text x="446" y="229" font-size="9" fill="#8b2c8a">Vectors</text>

  <line x1="454" y1="256" x2="402" y2="186" stroke="#8b2c8a" stroke-width="1.5" marker-end="url(#dfd0-arr)"/>
  <text x="460" y="247" font-size="9" fill="#8b2c8a">SHAP Values</text>
  <text x="460" y="258" font-size="9" fill="#8b2c8a">per Fund</text>

  <!-- Border -->
  <rect x="1" y="1" width="598" height="338" rx="4" fill="none" stroke="#ccc" stroke-width="1"/>
</svg>
