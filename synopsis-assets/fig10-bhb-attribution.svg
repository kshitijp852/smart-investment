<svg width="520" height="280" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif">
  <!-- Background -->
  <rect width="520" height="280" fill="white" stroke="#cccccc" stroke-width="1"/>

  <!-- X-axis base line and gridlines -->
  <!-- Scale: 0% at x=215, 3% at x=455 → 1% = 80px -->
  <!-- x=215=0% | x=295=1% | x=375=2% | x=455=3% -->
  <line x1="215" y1="38" x2="215" y2="222" stroke="#333" stroke-width="1.5"/>
  <line x1="295" y1="38" x2="295" y2="222" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="375" y1="38" x2="375" y2="222" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="455" y1="38" x2="455" y2="222" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="215" y1="222" x2="460" y2="222" stroke="#333" stroke-width="1.5"/>

  <!-- X-axis labels -->
  <text x="215" y="235" text-anchor="middle" font-size="10">0%</text>
  <text x="295" y="235" text-anchor="middle" font-size="10">+1%</text>
  <text x="375" y="235" text-anchor="middle" font-size="10">+2%</text>
  <text x="455" y="235" text-anchor="middle" font-size="10">+3%</text>
  <text x="335" y="252" text-anchor="middle" font-size="10" fill="#555">Annual Active Return (vs Blended Benchmark)</text>

  <!-- Section header -->
  <text x="260" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c2c2c">BHB Attribution — Balanced Portfolio (3Y)</text>

  <!-- ═══ BAR 1: Allocation Effect +0.62% → width=0.62×80=49.6≈50 ═══ -->
  <!-- y=45, h=28 -->
  <rect x="215" y="45" width="50" height="28" fill="#4a90d9" rx="2"/>
  <text x="208" y="64" text-anchor="end" font-size="11">Allocation Effect</text>
  <text x="270" y="64" font-size="11" font-weight="bold" fill="#1a5c8a">+0.62%</text>
  <text x="210" y="79" text-anchor="end" font-size="9" fill="#777" font-style="italic">(W_p − W_b) × (R_b,i − R_b)</text>

  <!-- ═══ BAR 2: Selection Effect +1.43% → width=1.43×80=114.4≈114 ═══ -->
  <!-- y=100, h=28 -->
  <rect x="215" y="100" width="114" height="28" fill="#2c5f8a" rx="2"/>
  <text x="208" y="119" text-anchor="end" font-size="11">Selection Effect</text>
  <text x="334" y="119" font-size="11" font-weight="bold" fill="#1a3f5c">+1.43%</text>
  <text x="210" y="134" text-anchor="end" font-size="9" fill="#777" font-style="italic">W_b,i × (R_p,i − R_b,i)</text>
  <!-- Annotation: validates scoring model -->
  <text x="345" y="109" font-size="9" fill="#c0392b">← validates scoring model</text>

  <!-- ═══ BAR 3: Interaction Effect +0.45% → width=0.45×80=36 ═══ -->
  <!-- y=155, h=28 -->
  <rect x="215" y="155" width="36" height="28" fill="#7ab3d9" rx="2"/>
  <text x="208" y="174" text-anchor="end" font-size="11">Interaction Effect</text>
  <text x="256" y="174" font-size="11" font-weight="bold" fill="#1a5c8a">+0.45%</text>
  <text x="210" y="189" text-anchor="end" font-size="9" fill="#777" font-style="italic">(W_p,i − W_b,i) × (R_p,i − R_b,i)</text>

  <!-- Separator -->
  <line x1="100" y1="197" x2="490" y2="197" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- ═══ BAR 4: Total Active Return +2.50% → width=2.50×80=200 ═══ -->
  <!-- y=202, h=15 -->
  <rect x="215" y="202" width="200" height="15" fill="#1a3f5c" rx="2"/>
  <text x="208" y="213" text-anchor="end" font-size="11" font-weight="bold">Total Active Return</text>
  <text x="420" y="213" font-size="11" font-weight="bold" fill="#1a3f5c">+2.50% p.a.</text>

  <!-- Legend note -->
  <text x="260" y="268" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">W_p = portfolio weight | W_b = benchmark weight | R_p,i = portfolio return in category i | R_b,i = benchmark return in category i</text>
</svg>
