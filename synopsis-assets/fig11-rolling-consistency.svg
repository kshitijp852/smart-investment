<svg width="480" height="295" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif">
  <!-- Background -->
  <rect width="480" height="295" fill="white" stroke="#cccccc" stroke-width="1"/>

  <!-- Chart area background -->
  <rect x="80" y="30" width="360" height="200" fill="#fafafa" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Y scale: 40%–80%, height=200 → 1% = 5px; bottom=230 -->
  <!-- y=230→40% | y=180→50% | y=130→60% | y=80→70% | y=30→80% -->

  <!-- Gridlines -->
  <line x1="80" y1="180" x2="440" y2="180" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.7"/>
  <line x1="80" y1="130" x2="440" y2="130" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="80"  x2="440" y2="80"  stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="30"  x2="440" y2="30"  stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Axes -->
  <line x1="80" y1="30"  x2="80"  y2="230" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="230" x2="440" y2="230" stroke="#333" stroke-width="1.5"/>

  <!-- Y labels -->
  <text x="73" y="234" text-anchor="end" font-size="10">40%</text>
  <text x="73" y="184" text-anchor="end" font-size="10">50%</text>
  <text x="73" y="134" text-anchor="end" font-size="10">60%</text>
  <text x="73" y="84"  text-anchor="end" font-size="10">70%</text>
  <text x="73" y="34"  text-anchor="end" font-size="10">80%</text>

  <!-- Y-axis title -->
  <text transform="rotate(-90,17,130)" x="0" y="0" text-anchor="middle" font-size="10" fill="#555">% Windows Beating Benchmark</text>

  <!-- Random baseline label -->
  <text x="442" y="176" font-size="9" fill="#e74c3c">50% =</text>
  <text x="442" y="187" font-size="9" fill="#e74c3c">random</text>

  <!-- ═══ GROUP 1: 1-Year Windows (centre x=185) ═══ -->
  <!-- SmartInvest 68.2%: y=230-(68.2-40)*5=230-141=89; h=141 | x=135, w=45 -->
  <rect x="135" y="89"  width="45" height="141" fill="#2c5f8a" rx="2"/>
  <!-- Trailing 54.3%: y=230-(54.3-40)*5=230-71.5=158.5≈159; h=71 | x=188, w=45 -->
  <rect x="188" y="159" width="45" height="71"  fill="#9ab5cc" rx="2"/>
  <!-- Value labels -->
  <text x="157" y="84"  text-anchor="middle" font-size="10" font-weight="bold" fill="#2c5f8a">68.2%</text>
  <text x="210" y="154" text-anchor="middle" font-size="10" fill="#555">54.3%</text>
  <!-- Group label -->
  <text x="173" y="249" text-anchor="middle" font-size="11" font-weight="bold">1-Year Windows</text>
  <text x="173" y="261" text-anchor="middle" font-size="9" fill="#666">(n = 36 windows)</text>

  <!-- ═══ GROUP 2: 3-Year Windows (centre x=340) ═══ -->
  <!-- SmartInvest 74.1%: y=230-(74.1-40)*5=230-170.5=59.5≈60; h=170 | x=290, w=45 -->
  <rect x="290" y="60"  width="45" height="170" fill="#2c5f8a" rx="2"/>
  <!-- Trailing 58.7%: y=230-(58.7-40)*5=230-93.5=136.5≈137; h=93 | x=343, w=45 -->
  <rect x="343" y="137" width="45" height="93"  fill="#9ab5cc" rx="2"/>
  <!-- Value labels -->
  <text x="312" y="55"  text-anchor="middle" font-size="10" font-weight="bold" fill="#2c5f8a">74.1%</text>
  <text x="365" y="132" text-anchor="middle" font-size="10" fill="#555">58.7%</text>
  <!-- Group label -->
  <text x="328" y="249" text-anchor="middle" font-size="11" font-weight="bold">3-Year Windows</text>
  <text x="328" y="261" text-anchor="middle" font-size="9" fill="#666">(n = 12 windows)</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="85"  y="277" width="14" height="11" fill="#2c5f8a" rx="2"/>
  <text x="103" y="287" font-size="10">SmartInvest (9-param composite scoring)</text>
  <rect x="290" y="277" width="14" height="11" fill="#9ab5cc" rx="2"/>
  <text x="308" y="287" font-size="10">Trailing-Returns Approach</text>
</svg>
